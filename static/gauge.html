<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        *{
            margin:0;
            padding:0;
            border:0;
            box-sizing:border-box;
        }
        html,body{
            width:100%;
            height:100%;
            background:transparent;
            overflow:hidden;       /* 禁止滚动 */
            position:fixed;       /* 固定不超出 */
            left:0;top:0;right:0;bottom:0;
        }
        canvas{
            display:block;
            width:100%;
            height:100%;
            position:absolute;
            left:0;
            top:0;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <script>
		function getQueryString(name) {
		    var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
		    var r = window.location.search.substr(1).match(reg);
		    if (r != null) {
		        return decodeURIComponent(r[2]);
		    }
		    return null;
		}
		const paramId = getQueryString("paramId");

        const canvas = document.getElementById('c');
        let ctx = canvas.getContext('2d');

        function resizeCanvas() {
            // 取父容器真实可用大小，不溢出
            canvas.width = document.body.clientWidth;
            canvas.height = document.body.clientHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        window.drawData = function(pid, data) {
			if (pid!=paramId)return;

            const size = Math.min(canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const padding = size * 0.02;
            const lineW = 1;

            ctx.beginPath();
            ctx.lineWidth = lineW * size * 0.01;
            const R = (size / 2) - ctx.lineWidth - padding;
            ctx.arc(cx, cy, R, 0, Math.PI * 2);
            ctx.strokeStyle = '#aaa';
            ctx.stroke();

            const sA = 50, eA = 130;
            const decS = sA * Math.PI / 180;
            const decE = eA * Math.PI / 180;

            ctx.beginPath();
            ctx.lineWidth = lineW * size * 0.012;
            ctx.arc(cx, cy, R - ctx.lineWidth * 2, decS, decE);
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, R - ctx.lineWidth * 4.5, decS, decE);
            ctx.stroke();

            const sep=10;
            const decS1 = (eA+sep)*Math.PI/180;
            const decE1 = (sA-sep)*Math.PI/180;

            ctx.beginPath();
            ctx.lineWidth = lineW * size * 0.08;
            const dR = R - ctx.lineWidth * 0.75;
            ctx.arc(cx, cy, dR, decS1, decE1);
            ctx.strokeStyle='#444';
            ctx.stroke();

            const progress = 1 - Math.max(0, Math.min(1, data.value/data.max));
            const decE2 = (sA - sep - progress*(279.9-sep*2)) * Math.PI/180;

            ctx.beginPath();
            ctx.arc(cx, cy, dR, decS1, decE2);
            ctx.strokeStyle='#fff';
            ctx.stroke();

            if(data.isActive){
                const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
                g.addColorStop(0, '#2a78b5');
                g.addColorStop(1, '#64d2cb');
                ctx.beginPath();
                ctx.arc(cx, cy, dR - ctx.lineWidth * 0.5, 0, Math.PI*2);
                ctx.fillStyle = g;
                ctx.fill();
            }

            let txt = data.value + '';
            let unit = data.unit;
            let qty=2.2;

            if (unit=='Hz') {
                txt = data.value + ' Hz';
                qty = txt.length>3 ? 3.1 : 2.4;
            } else if (unit=='Min') {
                unit = '';
                txt = data.value + ' Min';
            } else if (unit=='%') {
                qty = txt.length>2 ? 2.6 : (txt.length>1 ? 2 : 1);
            }

            ctx.font = `${size * 0.28}px Arial`;
            ctx.fillStyle="#fff";
            ctx.fillText(txt, cx, cy + size * 0.1);

            ctx.font = `${size * 0.08}px Arial`;
            ctx.fillText(unit, cx + size * 0.1 * qty, cy + size * 0.1);
        }
    </script>
</body>
</html>
